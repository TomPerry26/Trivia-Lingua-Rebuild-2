name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (must already be deployed to staging)."
        required: true
        type: string
  push:
    tags:
      - "release/*"

permissions:
  contents: read

jobs:
  verify-staging:
    name: Verify commit was deployed to staging
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Resolve target commit SHA
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "commit_sha=${{ github.event.inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Confirm commit has staging deployment marker
        env:
          TARGET_SHA: ${{ steps.resolve.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git ls-remote --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/deployed-to-staging/${TARGET_SHA}" | tee /tmp/staging-tag.txt
          if [[ ! -s /tmp/staging-tag.txt ]]; then
            echo "Required staging marker refs/tags/deployed-to-staging/${TARGET_SHA} not found."
            echo "Production deployments must come from commits already deployed to staging."
            exit 1
          fi

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: verify-staging
    environment: production
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-staging.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel Production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          deployment_url="$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")"
          echo "deployment_url=${deployment_url}" >> "$GITHUB_OUTPUT"
          echo "Production deployment URL: ${deployment_url}"

      - name: Preview auth smoke suite gate (production promotion)
        env:
          APP_BASE_URL: ${{ steps.deploy.outputs.deployment_url }}
          EXPECTED_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          SMOKE_BEARER_TOKEN: ${{ secrets.PRODUCTION_SMOKE_BEARER_TOKEN }}
          SMOKE_MAGIC_LINK_EMAIL: ${{ secrets.PRODUCTION_SMOKE_MAGIC_LINK_EMAIL }}
          SMOKE_MEMBER_QUIZ_ID: ${{ secrets.PRODUCTION_SMOKE_MEMBER_QUIZ_ID }}
          OAUTH_PROVIDER: ${{ vars.OAUTH_PROVIDER || 'google' }}
        run: ./.github/scripts/smoke-test.sh
