name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (must already be deployed to staging)."
        required: true
        type: string
  push:
    tags:
      - "release/*"

permissions:
  contents: read

jobs:
  verify-staging:
    name: Verify commit was deployed to staging
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Resolve target commit SHA
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "commit_sha=${{ github.event.inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Confirm commit has staging deployment marker
        env:
          TARGET_SHA: ${{ steps.resolve.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git ls-remote --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/deployed-to-staging/${TARGET_SHA}" | tee /tmp/staging-tag.txt
          if [[ ! -s /tmp/staging-tag.txt ]]; then
            echo "Required staging marker refs/tags/deployed-to-staging/${TARGET_SHA} not found."
            echo "Production deployments must come from commits already deployed to staging."
            exit 1
          fi

  preview-auth-smoke-gate:
    name: Preview auth smoke gate (required for production promotion)
    runs-on: ubuntu-latest
    needs: verify-staging
    outputs:
      preview_url: ${{ steps.latest_preview.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest Vercel preview deployment URL
        id: latest_preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          response="$(curl -sS -H "Authorization: Bearer ${VERCEL_TOKEN}" "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=preview&state=READY&limit=1")"
          preview_url="$(VERCEL_RESPONSE="${response}" node -e "const data = JSON.parse(process.env.VERCEL_RESPONSE || '{}'); const deployment = data.deployments?.[0]; if (!deployment?.url) process.exit(1); process.stdout.write(\`https://\${deployment.url}\`);")"
          echo "preview_url=${preview_url}" >> "$GITHUB_OUTPUT"
          echo "Using latest preview URL: ${preview_url}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run auth smoke suite against latest preview URL
        env:
          APP_BASE_URL: ${{ steps.latest_preview.outputs.preview_url }}
          EXPECTED_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_BEARER_TOKEN: ${{ secrets.STAGING_SMOKE_BEARER_TOKEN }}
          SMOKE_MAGIC_LINK_EMAIL: ${{ secrets.STAGING_SMOKE_MAGIC_LINK_EMAIL }}
          SMOKE_MEMBER_QUIZ_ID: ${{ secrets.STAGING_SMOKE_MEMBER_QUIZ_ID }}
          OAUTH_PROVIDER: ${{ vars.OAUTH_PROVIDER || 'google' }}
        run: ./.github/scripts/smoke-test.sh

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - verify-staging
      - preview-auth-smoke-gate
    environment: production
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-staging.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel Production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          deployment_url="$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")"
          echo "deployment_url=${deployment_url}" >> "$GITHUB_OUTPUT"
          echo "Production deployment URL: ${deployment_url}"

  production-auth-smoke-postdeploy:
    name: Production auth smoke check (post-deploy)
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run auth smoke suite against production deployment URL
        env:
          APP_BASE_URL: ${{ needs.deploy-production.outputs.deployment_url }}
          EXPECTED_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_BEARER_TOKEN: ${{ secrets.PRODUCTION_SMOKE_BEARER_TOKEN }}
          SMOKE_MAGIC_LINK_EMAIL: ${{ secrets.PRODUCTION_SMOKE_MAGIC_LINK_EMAIL }}
          SMOKE_MEMBER_QUIZ_ID: ${{ secrets.PRODUCTION_SMOKE_MEMBER_QUIZ_ID }}
          OAUTH_PROVIDER: ${{ vars.OAUTH_PROVIDER || 'google' }}
        run: ./.github/scripts/smoke-test.sh
